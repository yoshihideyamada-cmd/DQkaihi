<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>代付回避くん Ver.01</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d60000">

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.card{
    max-width:600px;
    margin:auto;
    background:#fff;
    border-radius:16px;
    padding:24px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    font-size:14px;
    margin-bottom:24px;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    font-size:24px;
}

button{
    width:100%;
    padding:14px;
    margin-top:16px;
    font-size:20px;
}

.result{
    text-align:center;
    margin-top:30px;
}

.finish775{
    font-size:56px;
    font-weight:bold;
    color:#d60000;
}

.safeTime{
    font-size:40px;
    font-weight:bold;
    color:#008000;
}

.warning{
    color:#d60000;
    font-weight:bold;
}

.info{
    margin-top:30px;
    border-top:1px solid #ccc;
    padding-top:20px;
    line-height:1.7;
}

.ruleTitle{
    font-weight:bold;
}

.footer{
    margin-top:30px;
    border-top:1px solid #eee;
    text-align:center;
    font-size:12px;
    color:#888;
    padding-top:15px;
}

</style>
</head>

<body oncontextmenu="return false">

<div class="card">

<h1>代付回避くん Ver.01</h1>

<div class="subtitle">
7.75h到達時刻・代付ボーダー確認ツール
</div>

<label>出勤時間</label>
<input type="time" id="startTime">

<button onclick="calculate()">計算</button>

<div class="result" id="result"></div>
<div class="info" id="info"></div>

<div class="footer">
間違えてたらごめんなさい。<br>
角刈りに修正依頼を。<br>
by 山田
</div>

</div>

<script>

const WORK_750 = 450;
const WORK_775 = 465;

const scheduleA = [
["08:45","09:00"],
["12:15","13:00"],
["17:45","18:00"],
["21:00","21:15"],
["01:00","01:15"],
["03:15","03:30"],
["05:30","05:45"],
["07:00","07:15"]
];

const scheduleB = [
["17:45","18:30"],
["21:00","21:15"],
["23:00","23:15"],
["01:00","01:15"],
["03:15","03:30"],
["05:30","05:45"],
["07:00","07:15"],
["08:45","09:00"]
];

function toMin(t){
    const [h,m]=t.split(":").map(Number);
    return h*60+m;
}

function fmt(m){
    m=(m%1440+1440)%1440;
    return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
}

function calc(start,target,breaks){

    let w=0,c=start;

    while(w<target){

        let nb=null;

        for(let d=0;d<3;d++){
            for(const b of breaks){

                let s=toMin(b[0])+d*1440;
                let e=toMin(b[1])+d*1440;
                if(e<=s)e+=1440;

                if(s>=c){
                    if(!nb||s<nb.s){
                        nb={s,e};
                    }
                }
            }
        }

        if(!nb){
            c+=target-w;
            break;
        }

        let u=nb.s-c;

        if(w+u>=target){
            c+=target-w;
            w=target;
        }else{
            w+=u;
            c=nb.e;
        }
    }

    return c;
}

function calculate(){

    const start=document.getElementById("startTime").value;
    if(!start)return;

    const sm=toMin(start);
    const useA=sm<735;
    const br=useA?scheduleA:scheduleB;

    const f750=calc(sm,WORK_750,br);
    const f775=calc(sm,WORK_775,br);

    document.getElementById("result").innerHTML=`
        <div>本日の7.75h</div>
        <div class="finish775">${fmt(f775)}</div>

        <div class="warning">⚠ ${fmt(f775)}以降は代付対象</div>

        <br>

        <div>代付ボーダー打刻時間（7.5h）</div>
        <div class="safeTime">${fmt(f750)} ～ ${fmt(f775-1)}</div>
    `;

    const name = useA
    ? "パターンA（00:00～12:14）"
    : "パターンB（12:15～23:59）";

    document.getElementById("info").innerHTML=`
        <div class="ruleTitle">適用ルール</div>
        ${name}
        <br><br>

        <div class="ruleTitle">適用休憩</div>
        ${br.map(b=>b[0]+" ～ "+b[1]).join("<br>")}
    `;
}

if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
